        "

    - name: Run upgrade tests
      working-directory: ./hindsight-dev
      run: uv run pytest upgrade_tests/ -v --tb=short

    - name: Show upgrade test logs
      if: always()
      run: |
        echo "=== Upgrade Test Server Logs ==="
        for log in /tmp/upgrade-test-*.log; do
          if [ -f "$log" ]; then
