        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteDocumentResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete a document
      tags:
      - Documents
