openapi: 3.1.0
info:
  contact:
    name: Memory System
  description: HTTP API for Hindsight
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Hindsight HTTP API
  version: 0.5.4
servers:
- url: /
paths:
  /health:
    get:
      description: Checks the health of the API and database connection
      operationId: health_endpoint_health_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Health check endpoint
      tags:
      - Monitoring
  /version:
    get:
      description: Returns API version information and enabled feature flags. Use
        this to check which capabilities are available in this deployment.
      operationId: get_version
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
          description: Successful Response
      summary: Get API version and feature flags
      tags:
      - Monitoring
  /metrics:
    get:
      description: Exports metrics in Prometheus format for scraping
      operationId: metrics_endpoint_metrics_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Prometheus metrics endpoint
      tags:
      - Monitoring
  /v1/default/banks/{bank_id}/graph:
    get:
      description: "Retrieve graph data for visualization, optionally filtered by\
        \ type (world/experience/opinion)."
      operationId: get_graph
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 1000
          title: Limit
          type: integer
        style: form
      - explode: true
        in: query
        name: q
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: tags
        required: false
        schema:
          items:
            nullable: true
            type: string
          nullable: true
          type: array
        style: form
      - explode: true
        in: query
        name: tags_match
        required: false
        schema:
          default: all_strict
          title: Tags Match
          type: string
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphDataResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get memory graph data
      tags:
      - Memory
  /v1/default/banks/{bank_id}/memories/list:
    get:
      description: "List memory units with pagination and optional full-text search.\
        \ Supports filtering by type. Results are sorted by most recent first (mentioned_at\
        \ DESC, then created_at DESC)."
      operationId: list_memories
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: q
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: consolidation_state
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          title: Limit
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          title: Offset
          type: integer
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMemoryUnitsResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List memory units
      tags:
      - Memory
  /v1/default/banks/{bank_id}/memories/{memory_id}:
    get:
      description: "Get a single memory unit by ID with all its metadata including\
        \ entities and tags. Note: the 'history' field is deprecated and always returns\
        \ an empty list - use GET /memories/{memory_id}/history instead."
      operationId: get_memory
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: memory_id
        required: true
        schema:
          title: Memory Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get memory unit
      tags:
      - Memory
  /v1/default/banks/{bank_id}/memories/{memory_id}/history:
    get:
      description: "Get the full history of an observation, with each change's source\
        \ facts resolved to their text."
      operationId: get_observation_history
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: memory_id
        required: true
        schema:
          title: Memory Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get observation history
      tags:
      - Memory
  /v1/default/banks/{bank_id}/memories/recall:
    post:
      description: |-
        Recall memory using semantic similarity and spreading activation.

        The type parameter is optional and must be one of:
        - `world`: General knowledge about people, places, events, and things that happen
        - `experience`: Memories about experience, conversations, actions taken, and tasks performed
      operationId: recall_memories
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecallRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecallResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Recall memory
      tags:
      - Memory
  /v1/default/banks/{bank_id}/reflect:
    post:
      description: |-
        Reflect and formulate an answer using bank identity, world facts, and opinions.

        This endpoint:
        1. Retrieves experience (conversations and events)
        2. Retrieves world facts relevant to the query
        3. Retrieves existing opinions (bank's perspectives)
        4. Uses LLM to formulate a contextual answer
        5. Returns plain text answer and the facts used
      operationId: reflect
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReflectRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReflectResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Reflect and generate answer
      tags:
      - Memory
  /v1/default/banks:
    get:
      description: Get a list of all agents with their profiles
      operationId: list_banks
      parameters:
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankListResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List all memory banks
      tags:
      - Banks
  /v1/default/banks/{bank_id}/stats:
    get:
      description: Get statistics about nodes and links for a specific agent
      operationId: get_agent_stats
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankStatsResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get statistics for memory bank
      tags:
      - Banks
  /v1/default/banks/{bank_id}/stats/memories-timeseries:
    get:
      description: "Memories ingested over a period, bucketed by time and broken down\
        \ by fact type."
      operationId: get_memories_timeseries
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: true
        in: query
        name: period
        required: false
        schema:
          default: 7d
          title: Period
          type: string
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoriesTimeseriesResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Memory ingestion time-series
      tags:
      - Banks
  /v1/default/banks/{bank_id}/entities:
    get:
      description: "List all entities (people, organizations, etc.) known by the bank,\
        \ ordered by mention count. Supports pagination."
      operationId: list_entities
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - description: Maximum number of entities to return
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          description: Maximum number of entities to return
          title: Limit
          type: integer
        style: form
      - description: Offset for pagination
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          description: Offset for pagination
          title: Offset
          type: integer
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityListResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List entities
      tags:
      - Entities
  /v1/default/banks/{bank_id}/entities/graph:
    get:
      description: Return a graph of entities (nodes) and their co-occurrences (edges)
        for visualization.
      operationId: get_entity_graph
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - description: Maximum number of co-occurrence edges to return
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 1000
          description: Maximum number of co-occurrence edges to return
          title: Limit
          type: integer
        style: form
      - description: Minimum cooccurrence_count to include an edge
        explode: true
        in: query
        name: min_count
        required: false
        schema:
          default: 1
          description: Minimum cooccurrence_count to include an edge
          title: Min Count
          type: integer
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityGraphResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get entity co-occurrence graph
      tags:
      - Entities
  /v1/default/banks/{bank_id}/entities/{entity_id}:
    get:
      description: Get detailed information about an entity including observations
        (mental model).
      operationId: get_entity
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: entity_id
        required: true
        schema:
          title: Entity Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityDetailResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get entity details
      tags:
      - Entities
  /v1/default/banks/{bank_id}/entities/{entity_id}/regenerate:
    post:
      deprecated: true
      description: This endpoint is deprecated. Entity observations have been replaced
        by mental models.
      operationId: regenerate_entity_observations
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: entity_id
        required: true
        schema:
          title: Entity Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityDetailResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Regenerate entity observations (deprecated)
      tags:
      - Entities
  /v1/default/banks/{bank_id}/mental-models:
    get:
      description: List user-curated living documents that stay current.
      operationId: list_mental_models
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - description: Filter by tags
        explode: true
        in: query
        name: tags
        required: false
        schema:
          items:
            type: string
          nullable: true
          type: array
        style: form
      - description: How to match tags
        explode: true
        in: query
        name: tags_match
        required: false
        schema:
          default: any
          description: How to match tags
          enum:
          - any
          - all
          - exact
          title: Tags Match
          type: string
        style: form
      - description: "Detail level: 'metadata' (names/tags only), 'content' (adds\
          \ content/config), 'full' (includes reflect_response)"
        explode: true
        in: query
        name: detail
        required: false
        schema:
          default: full
          description: "Detail level: 'metadata' (names/tags only), 'content' (adds\
            \ content/config), 'full' (includes reflect_response)"
          enum:
          - metadata
          - content
          - full
          title: Detail
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentalModelListResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List mental models
      tags:
      - Mental Models
    post:
      description: Create a mental model by running reflect with the source query
        in the background. Returns an operation ID to track progress. The content
        is auto-generated by the reflect endpoint. Use the operations endpoint to
        check completion status.
      operationId: create_mental_model
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMentalModelRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMentalModelResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create mental model
      tags:
      - Mental Models
  /v1/default/banks/{bank_id}/mental-models/{mental_model_id}:
    delete:
      description: Delete a mental model.
      operationId: delete_mental_model
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: mental_model_id
        required: true
        schema:
          title: Mental Model Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete mental model
      tags:
      - Mental Models
    get:
      description: Get a specific mental model by ID.
      operationId: get_mental_model
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: mental_model_id
        required: true
        schema:
          title: Mental Model Id
          type: string
        style: simple
      - description: "Detail level: 'metadata' (names/tags only), 'content' (adds\
          \ content/config), 'full' (includes reflect_response)"
        explode: true
        in: query
        name: detail
        required: false
        schema:
          default: full
          description: "Detail level: 'metadata' (names/tags only), 'content' (adds\
            \ content/config), 'full' (includes reflect_response)"
          enum:
          - metadata
          - content
          - full
          title: Detail
          type: string
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentalModelResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get mental model
      tags:
      - Mental Models
    patch:
      description: Update a mental model's name and/or source query.
      operationId: update_mental_model
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: mental_model_id
        required: true
        schema:
          title: Mental Model Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMentalModelRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentalModelResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update mental model
      tags:
      - Mental Models
  /v1/default/banks/{bank_id}/mental-models/{mental_model_id}/history:
    get:
      description: "Get the refresh history of a mental model, showing content changes\
        \ over time."
      operationId: get_mental_model_history
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: mental_model_id
        required: true
        schema:
          title: Mental Model Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get mental model history
      tags:
      - Mental Models
  /v1/default/banks/{bank_id}/mental-models/{mental_model_id}/refresh:
    post:
      description: Submit an async task to re-run the source query through reflect
        and update the content.
      operationId: refresh_mental_model
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: mental_model_id
        required: true
        schema:
          title: Mental Model Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
